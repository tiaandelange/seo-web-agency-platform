<!DOCTYPE html>
<html lang="en-ZA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Koppie Systems — logo review</title>
    <style>
      :root {
        --ink: #14242b;
        --canvas: #f6f7f4;
        --line: #d6dbd9;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Manrope, Inter, Segoe UI, Helvetica, Arial, sans-serif;
        color: var(--ink);
        background: var(--canvas);
        line-height: 1.45;
      }
      header, section { max-width: 960px; margin: 0 auto; padding: 1.25rem; }
      header { padding-top: 1.5rem; }
      header p { color: #4a5560; max-width: 42rem; }
      .note {
        font-size: 0.875rem;
        padding: 0.75rem 1rem;
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 6px;
      }
      h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 0 0 0.75rem;
      }
      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 1.25rem;
        background: #fff;
      }
      .card.dark {
        background: var(--ink);
        color: #fff;
        border-color: transparent;
      }
      .card figcaption {
        margin-top: 0.75rem;
        font-size: 0.8rem;
        color: #4a5560;
      }
      .card.dark figcaption { color: #e8dfc9; }
      .card img { display: block; width: auto; max-width: 100%; height: auto; }
      .row { display: flex; flex-wrap: wrap; align-items: center; gap: 1.25rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>Logo review — SVG only</h1>
      <p>
        Circular field uses theme ink <code>#14242B</code>. Site header uses the symbol SVG + HTML
        wordmark. No PNG logos.
      </p>
      <p class="note">Path: <code>/brand/logo-review.html</code></p>
    </header>

    <section>
      <h2>Symbol on theme surfaces</h2>
      <div class="grid">
        <figure class="card">
          <img src="/brand/koppie-logo-symbol.svg" alt="On canvas" width="96" height="96" />
          <figcaption>With circle (live header)</figcaption>
        </figure>
        <figure class="card dark">
          <img src="/brand/koppie-logo-symbol.svg" alt="On ink" width="96" height="96" />
          <figcaption>With circle on ink</figcaption>
        </figure>
        <figure class="card">
          <img src="/brand/koppie-logo-symbol-nobg.svg" alt="No bg light" width="96" height="96" />
          <figcaption>No bg on canvas</figcaption>
        </figure>
        <figure class="card dark">
          <img src="/brand/koppie-logo-symbol-nobg.svg" alt="No bg dark" width="96" height="96" />
          <figcaption>No bg on ink</figcaption>
        </figure>
      </div>
    </section>

    <section>
      <h2>Header pattern (SVG + HTML text)</h2>
      <div class="card" style="display:flex;align-items:center;gap:0.65rem">
        <img src="/brand/koppie-logo-symbol-nobg.svg" width="36" height="36" alt="" style="display:block;align-self:center" />
        <span style="display:flex;flex-direction:column;justify-content:center;gap:0.25rem;line-height:1">
          <span style="font-size:0.65rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#14242b">Koppie</span>
          <span style="font-size:0.65rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#1e6f6d">Systems</span>
        </span>
      </div>
    </section>

    <section>
      <h2>Export lockups</h2>
      <div class="grid">
        <figure class="card">
          <img src="/brand/koppie-logo-horizontal.svg" alt="Horizontal" height="48" />
          <figcaption>horizontal</figcaption>
        </figure>
        <figure class="card">
          <img src="/brand/koppie-logo-dark.svg" alt="Dark mono" height="48" />
          <figcaption>dark mono</figcaption>
        </figure>
        <figure class="card dark">
          <img src="/brand/koppie-logo-white.svg" alt="White mono" height="48" />
          <figcaption>white mono</figcaption>
        </figure>
      </div>
    </section>

    <section>
      <h2>Favicon sizes</h2>
      <div class="card">
        <div class="row">
          <img src="/brand/favicon.svg" width="16" height="16" alt="16" />
          <img src="/brand/favicon.svg" width="24" height="24" alt="24" />
          <img src="/brand/favicon.svg" width="32" height="32" alt="32" />
          <img src="/brand/favicon.svg" width="48" height="48" alt="48" />
        </div>
      </div>
    </section>
  </body>
</html>
